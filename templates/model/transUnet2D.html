        }

        h2 {
            font-weight: 500;

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<script>
    const metrics = ['Dice', 'IoU', 'Precision', 'Recall'];
    const modelData = {
        'UNet': [78.68, 67.25, 81.98, 82.56],
        'UNet++': [77.32, 65.53, 80.21, 83.85],
        'Attention UNet': [77.84, 64.91, 79.37, 82.74],
        'TransUNet': [78.85, 67.42, 82.12, 83.51],
        'SwinUNet': [76.78, 64.13, 74.95, 86.24],
        'EMCAD': [79.63, 68.30, 81.96, 84.42],
        'Ours': [79.76, 68.40, 82.05, 84.84]
    };

    // =========================
    // 1️⃣ 绘制图表
    // =========================
    window.onload = function () {
        const chart = echarts.init(document.getElementById('lineChart'));

        const colors = [
            '#4C72B0',  // 蓝
            '#55A868',  // 绿
            '#C44E52',  // 红
            '#8172B2',  // 紫
            '#CCB974',  // 卡其
            '#64B5CD',  // 青
            '#8C8C8C',  // 灰
            '#E17C05',  // 橙
            '#937860',  // 棕
            '#000000'   // 黑（你的模型 nnUKAN）
        ];

        const series = Object.keys(modelData).map((name, idx) => ({
            name: name,
            type: 'line',
            smooth: false,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: {
                width: name === 'Ours' ? 3 : 2
            },

            itemStyle: {
                color: colors[idx]
            },

            emphasis: {
                focus: 'series'
            },

            blur: {
                lineStyle: {
                    opacity: 0.2   // ⭐核心：其他线变淡
                },
                itemStyle: {
                    opacity: 0.2
                }
            },
            data: modelData[name]
        }));

        chart.setOption({
            title: {
                text: '不同模型分割性能对比',
                left: 'center',
                textStyle: {
                    fontSize: 16,
                    fontWeight: 'normal'
                }
            },
            tooltip: {
                trigger: 'axis'
            },
            legend: {
                top: 40,
                type: 'scroll',
                textStyle: {
                    fontSize: 12
                },
            },
            grid: {
                left: 60,
                right: 40,
                top: 90,     // ✅ 给标题和图例留空间
                bottom: 50
            },
            xAxis: {
                type: 'category',
                data: metrics,
                axisLine: {
                    lineStyle: {color: '#333'}
                },
                axisLabel: {
                    fontSize: 12
                }
            },
            yAxis: {
                type: 'value',
                min: 64,
                max: 90,
                axisLabel: {
                    formatter: '{value}%',
                    fontSize: 12
                },
                splitLine: {
                    lineStyle: {
                        type: 'dashed',
                        color: '#ccc'
                    }
                }
            },
            series: Object.keys(modelData).map((name, idx) => ({
                name: name,
                type: 'line',
                smooth: false,

                lineStyle: {
                    width: name === 'Ours' ? 3 : 2
                },

                itemStyle: {
                    color: colors[idx],
                    opacity: name === 'Ours' ? 1 : 0.7
                },

                label: {
                    show: name === 'Ours',   // 只显示你的模型
                    position: 'top',
                    fontSize: 10
                },

                emphasis: {
                    focus: 'series'
                },

                data: modelData[name]
            }))
        })

        // =========================
        // 生成表格（和图一致）
        // =========================
        const tbody = document.querySelector("#resultTable tbody");

        // 找每一列最大值（用于高亮）
        const maxValues = [0, 0, 0, 0];

        Object.values(modelData).forEach(arr => {
            arr.forEach((val, i) => {
                if (val > maxValues[i]) maxValues[i] = val;
            });
        });

        Object.keys(modelData).forEach(model => {
            const row = document.createElement("tr");
            const values = modelData[model];

            row.innerHTML = `
            <td>${model}</td>
            <td>${values[0]}</td>
            <td>${values[1]}</td>
            <td>${values[2]}</td>
            <td>${values[3]}</td>
        `;

            const top2Values = metrics.map((_, colIndex) => {
                const col = Object.values(modelData).map(row => row[colIndex]);
                const sorted = [...col].sort((a, b) => b - a);
                return {
                    max: sorted[0],
                    second: sorted[1]
                };
            });

            row.querySelectorAll("td").forEach((td, i) => {
                if (i === 0) return;

                const val = values[i - 1];
                const { max, second } = top2Values[i - 1];

                if (val === max) {
                    td.style.color = "#C44E52";  // 第一名
                    td.style.fontWeight = "bold";
                } else if (val === second) {
                    td.style.color = "#55A868";  // 第二名
                    td.style.fontWeight = "bold";
                }
            });

            tbody.appendChild(row);
        });

        const barChart = echarts.init(document.getElementById('barChart'));

        const modelNames = Object.keys(modelData);
        const diceValues = modelNames.map(name => modelData[name][0]);

        const labelOption = {
            show: true,
            position: 'top',
            formatter: '{c}%',
            fontSize: 12
        };

        const sorted = modelNames
            .map((name, i) => ({ name, value: diceValues[i] }))
            .sort((a, b) => b.value - a.value);

        const best = sorted[0].name;
        const second = sorted[1].name;

        barChart.setOption({
            title: {
                text: 'Dice 指标对比',
                left: 'center',
                textStyle: {
                    fontSize: 15,
                    fontWeight: 'normal'
                }
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'shadow'
                }
            },
            grid: {
                left: 60,
                right: 20,
                top: 90,
                bottom: 80
            },
            xAxis: {
                type: 'category',
                data: modelNames,
                axisLabel: {
                    rotate: 30,
                    fontSize: 11
                }
            },
            yAxis: {
                type: 'value',
                min: 60,
                max: 85,
                axisLabel: {
                    formatter: '{value}%'
                }
            },
            series: [
                {
                    name: 'Dice',
                    type: 'bar',
                    barWidth: '55%',

                    itemStyle: {
                          color: function (params) {
                            if (params.name === best) return '#C44E52';   // 第一名
                            if (params.name === second) return '#55A868'; // 第二名
                            return '#4C72B0';                             // 其他
                        }
                    },

                    emphasis: {
                        focus: 'self'
                    },
                    label: {
                        show: true,
                        position: 'top',
                        formatter: function (params) {
                            if (params.name === best) return params.value + '% 🥇';
                            if (params.name === second) return params.value + '% 🥈';
                            return params.value + '%';
                        },
                        fontSize: 11
                    },

                    data: diceValues
                }
            ],

        });
    };

</script>
